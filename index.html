<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر صفاء المصري للقدرات الذهنية العليا</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: #e1f5fe; /* أزرق فاتح طبيعي */
            overflow: hidden; 
        }

        /* صورة الفتاة الطبيعية - تظهر بالكامل */
        .girl-hero {
            position: absolute; bottom: 0; left: 2%; 
            height: 85vh; width: auto; z-index: 5;
            filter: drop-shadow(5px 5px 20px rgba(0,0,0,0.1));
            transition: 0.5s ease-in-out;
        }

        #app-container { 
            background: rgba(255, 255, 255, 0.98); width: 85%; max-width: 850px; 
            padding: 40px; border-radius: 40px; border: 4px solid #D4AF37;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 10; position: relative;
            margin-left: 250px; /* لإفساح مجال للفتاة على اليسار */
        }

        .timer-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 5px solid #0288d1; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.5rem;
            margin: 0 auto 20px; color: #0288d1;
        }

        .q-title { font-size: 1.4rem; color: #01579b; margin-bottom: 25px; line-height: 1.6; font-weight: 700; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { 
            padding: 18px; border: 2px solid #e0e0e0; border-radius: 15px; 
            cursor: pointer; transition: 0.2s; font-size: 1.1rem; background: #fff;
            text-align: right; font-family: 'Cairo'; 
        }
        .opt-btn:hover { border-color: #D4AF37; background: #fffdf2; }
        
        .correct { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #2e7d32; }
        .wrong { background: #ffcdd2 !important; border-color: #f44336 !important; color: #c62828; }

        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        
        @media (max-width: 1100px) {
            #app-container { margin-left: 0; width: 95%; }
            .girl-hero { display: none; }
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/vz4P74Y/real-girl.png" class="girl-hero" id="girl-img" alt="فتاة مبدعة">

    <div id="app-container">
        <div id="start-screen">
            <div class="header">
                <h1 style="color: #01579b; margin: 0;">مختبر القياس المعرفي المتقدم</h1>
                <p style="color: #D4AF37; font-weight: bold;">إشراف الأخصائية: صفاء المصري</p>
            </div>
            <p>هذا الاختبار يقيس قدرتك على الربط الإبداعي وحل المعضلات غير التقليدية.</p>
            <input type="text" id="student-name" placeholder="اسم الطالبة" style="padding:15px; width:70%; margin:10px; border-radius:10px; border:1px solid #ccc;"><br>
            <button class="opt-btn" style="background: #D4AF37; color: white; border: none; padding: 15px 40px;" onclick="startQuiz()">ابدئي التحدي الآن</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="timer-circle" id="timer">30</div>
            <div id="question" class="q-title"></div>
            <div id="options" class="options-list"></div>
        </div>

        <div id="result-screen" style="display:none;">
            <h2 style="color: #01579b;">نتيجتك في تحليل الموهبة</h2>
            <h1 id="final-score" style="font-size: 4rem; color: #D4AF37;"></h1>
            <p id="feedback-text"></p>
            <button class="opt-btn" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </div>

<script>
    const questions = [
        {
            q: "إذا كنتِ تصممين مدينة للمستقبل، أي عنصر ستجعلينه 'قلب المدينة' لضمان استدامة الإبداع؟",
            options: [
                "مختبرات تكنولوجية (ذكاء منطقي/تقني)",
                "حدائق غناء ونظم بيئية (ذكاء طبيعي)",
                "مراكز حوار وفلسفة (ذكاء لغوي/وجودي)",
                "ساحات فنون تشكيلية (ذكاء بصري/مكاني)"
            ],
            correct: 2
        },
        {
            q: "عندما تسمعين معزوفة موسيقية غامضة، ما هي أول فكرة تخطر ببالك لتحليل جمالها؟",
            options: [
                "حساب الترددات والنسب الرياضية للنغمات",
                "تخيل قصة أو مشهد سينمائي يرافق اللحن",
                "الشعور بالحالة المزاجية للملحن ومشاركتها",
                "تحليل الآلات المستخدمة وكيفية صنعها"
            ],
            correct: 1
        },
        {
            q: "أمامك معضلة: 'هل نضحي بقطعة أثرية وحيدة لإنقاذ غابة مهددة؟'.. كيف يقرر عقلك؟",
            options: [
                "أختار الأثر؛ فهو تاريخ لا يعوض (ذكاء تاريخي)",
                "أختار الغابة؛ فهي حياة تتنفس (ذكاء بيئي)",
                "أبحث عن حل ثالث يحميهما معاً (ذكاء إبداعي)",
                "أترك القرار للتصويت الجماعي (ذكاء اجتماعي)"
            ],
            correct: 2
        },
        {
            q: "إذا طُلب منك شرح مفهوم 'اللانهاية' لطفل، أي وسيلة تختارين؟",
            options: [
                "مرآتان متقابلتان تعكسان بعضهما (ذكاء بصري)",
                "العد المستمر للأرقام دون توقف (ذكاء رياضي)",
                "قصة عن محيط بلا شطآن (ذكاء لغوي)",
                "مساحة واسعة جداً من الركض (ذكاء حركي)"
            ],
            correct: 0
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;

    function startQuiz() {
        if(!document.getElementById('student-name').value) return alert("لطفاً، ادخلي الاسم");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        clearInterval(timerInterval);
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft;
        
        const qData = questions[currentIdx];
        document.getElementById('question').innerText = qData.q;
        const optionsBox = document.getElementById('options');
        optionsBox.innerHTML = '';

        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsBox.appendChild(btn);
        });

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                checkAnswer(-1, null);
            }
        }, 1000);
    }

    function checkAnswer(idx, btn) {
        clearInterval(timerInterval);
        const correct = questions[currentIdx].correct;
        const girl = document.getElementById('girl-img');
        
        if(idx === correct) {
            score++;
            if(btn) btn.classList.add('correct');
            girl.style.transform = "scale(1.1) translateY(-10px)";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
        } else {
            if(btn) btn.classList.add('wrong');
            girl.style.transform = "scale(0.9) grayscale(0.5)";
        }

        setTimeout(() => {
            girl.style.transform = "scale(1)";
            currentIdx++;
            if(currentIdx < questions.length) loadQuestion();
            else showResults();
        }, 1500);
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        document.getElementById('feedback-text').innerText = score >= 3 ? "لديكِ قدرة مذهلة على الربط الإبداعي!" : "محاولة جيدة، التفكير الإبداعي يحتاج لمزيد من التأمل.";
    }
</script>
</body>
</html>
